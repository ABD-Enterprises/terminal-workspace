# Generated by orc adopt --with-workflows from orc-standards@v7.17.0 — overwrite via 'orc adopt --force --with-workflows'.
# Do not hand-edit; tracked drift will be detected by 'orc adopt' on the next run.
#
# Gemini Code Assist (GitHub App) configuration. The Code Assist app runs
# Gemini 2.5 Pro server-side — model selection is NOT exposed here. What we
# tune is review noise: severity threshold, comment cap, and ignore patterns
# so Pro spends its budget on signal, not on style nits a linter already
# caught. The cheap Flash-first pass lives in
# tools/orc/scripts/gemini-review.sh (local pre-push), not here.
#
# Reference: https://developers.google.com/gemini-code-assist/docs/customize-gemini-behavior-github

have_fun: false

code_review:
  disable: false
  # MEDIUM means Code Assist won't surface LOW-severity nits (it'll still flag
  # them privately if you ask for the full review). ORC policy puts the
  # linter-class stuff on the local-first path; PR comments should be
  # reserved for findings a reviewer actually needs to act on.
  comment_severity_threshold: MEDIUM
  # Hard cap. -1 = unlimited; tightening this trims long PRs where Pro tends
  # to over-comment.
  max_review_comments: 20
  pull_request_opened:
    help: false
    summary: true
    code_review: true

ignore_patterns:
  - "**/dist/**"
  - "**/build/**"
  - "**/node_modules/**"
  - "**/.next/**"
  - "**/.turbo/**"
  - "**/__pycache__/**"
  - "**/.pytest_cache/**"
  - "**/coverage/**"
  - "**/.coverage"
  - "**/*.lock"
  - "**/package-lock.json"
  - "**/pnpm-lock.yaml"
  - "**/yarn.lock"
  - "**/poetry.lock"
  - "**/Cargo.lock"
  - "**/uv.lock"
  - "**/*.min.js"
  - "**/*.min.css"
  - "**/*.map"
