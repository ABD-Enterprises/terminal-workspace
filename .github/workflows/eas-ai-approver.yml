# Generated by ai-pipeline adopt --with-workflows from enterprise-ai-standards@v7.13.1 — overwrite via 'ai-pipeline adopt --force --with-workflows'.
# Do not hand-edit; tracked drift will be detected by 'ai-pipeline adopt' on the next run.
# Copy-in workflow — full logic inlined. Routes sparse cross-family AI review
# requests per §A13 without API-billed LLM calls or direct PR approvals.
name: EAS AI Approver Routing

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review, labeled, unlabeled, edited]

permissions:
  contents: read
  pull-requests: read
  issues: write

env:
  CODEX_REVIEW_TRIGGER: "@codex review"
  COPILOT_REVIEW_TRIGGER: "@copilot review"
  ROUTING_MARKER_PREFIX: "<!-- eas-ai-approver:"

jobs:
  route:
    runs-on: [self-hosted, macOS, local-build]
    # Skip rc files + clear $BASH_ENV so workflows don't depend on the
    # runner user's shell init (failure mode documented in PR #214 /
    # #334 of ABD-Enterprises/brew-sync).
    env:
      BASH_ENV: ""
    defaults:
      run:
        shell: bash --noprofile --norc -eo pipefail {0}
    steps:
      - name: Route reviewer requests
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          pr_json=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json \
            labels,author,commits,isDraft,body)

          is_draft=$(jq -r '.isDraft' <<<"$pr_json")
          if [ "$is_draft" = "true" ]; then
            echo "::notice::Draft PR; no AI approver route requested."
            exit 0
          fi

          labels_csv=$(jq -r '[.labels[].name] | join(",")' <<<"$pr_json")
          author_login=$(jq -r '.author.login' <<<"$pr_json")
          pr_body=$(jq -r '.body // ""' <<<"$pr_json")
          commit_text=$(jq -r '[.commits[].messageHeadline, .commits[].messageBody] | join("\n")' <<<"$pr_json")

          has_label() {
            local label="$1"
            echo ",$labels_csv," | grep -q ",$label,"
          }

          author_family="unknown"
          lower_author=$(printf '%s\n%s\n%s\n' "$author_login" "$pr_body" "$commit_text" | tr '[:upper:]' '[:lower:]')
          if echo "$lower_author" | grep -Eq 'co-authored-by:.*(codex|openai)|(^|[^a-z])codex([^a-z]|$)'; then
            author_family="codex"
          elif echo "$lower_author" | grep -Eq 'co-authored-by:.*(claude|anthropic)|(^|[^a-z])claude([^a-z]|$)'; then
            author_family="claude"
          fi

          if has_label "chore:mechanical-sweep"; then
            echo "::notice::Mechanical sweep; no reviewer beyond CI/Gemini baseline."
            exit 0
          fi

          reviewers=()
          reasons=()

          if has_label "needs-independent-review"; then
            if [ "$author_family" = "codex" ]; then
              reviewers+=("copilot")
              reasons+=("Codex-authored PR with needs-independent-review; route to Copilot for family separation")
            else
              reviewers+=("codex")
              reasons+=("needs-independent-review label; route to Codex Cloud Agent")
            fi
          fi

          if has_label "risk:high"; then
            reviewers+=("codex")
            reasons+=("risk:high label; route to Codex Cloud Agent")
          fi

          if has_label "request:copilot-review"; then
            reviewers+=("copilot")
            reasons+=("explicit request:copilot-review label")
          fi

          if [ "${#reviewers[@]}" -eq 0 ]; then
            echo "::notice::Gemini baseline only; no additional AI approver route."
            exit 0
          fi

          existing=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json comments \
            --jq '[.comments[].body] | join("\n---\n")')

          for i in "${!reviewers[@]}"; do
            reviewer="${reviewers[$i]}"
            reason="${reasons[$i]}"
            marker="${ROUTING_MARKER_PREFIX}${reviewer}:${HEAD_SHA} -->"
            if echo "$existing" | grep -qF "$marker"; then
              echo "::notice::$reviewer already routed for $HEAD_SHA"
              continue
            fi

            case "$reviewer" in
              codex)
                trigger="$CODEX_REVIEW_TRIGGER"
                ;;
              copilot)
                trigger="$COPILOT_REVIEW_TRIGGER"
                ;;
              *)
                echo "::error::unknown reviewer route: $reviewer"
                exit 2
                ;;
            esac

            body=$(printf "%s\n%s\n\nEAS AI approver routing requested **%s** for %s.\n\nReason: %s.\n\nThis workflow only routes subscription-backed review surfaces; it does not call API-billed LLM endpoints and does not approve the PR directly.\n" \
              "$marker" "$trigger" "$reviewer" "$HEAD_SHA" "$reason")
            gh pr comment "$PR_NUMBER" --repo "$REPO" --body "$body"
          done
