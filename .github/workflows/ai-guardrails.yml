name: AI Guardrails

# Runs on every PR targeting main only.
# Do NOT add push:main trigger — the validator checks state files which are in
# transition during a merge; running on push causes false-positive failures.
# Do NOT add macos-latest jobs here — macOS runners cost significantly more credits.
# Native Swift builds use a separate workflow_dispatch or release-only trigger.
# See developer/coding-standards.md "CI Design Rules" for the full policy.

on:
  pull_request:
    branches: [main]

jobs:
  enforce:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: pnpm

      - name: Enforce runtime guardrails
        run: |
          node tools/validators/enforce-runtime-guardrails.js \
            --repo . \
            --config ai.config.json \
            --base "${{ github.event.pull_request.base.sha }}"
