# Generated by orc adopt --with-workflows from v7.17.0.
# Runs orc's repo-agnostic CI-parity guards (the ADOPTER_READY set) against THIS repo, so an adopter
# inherits orc's guard fixes (e.g. the process.exit-before-flush truncation class, Windows-breaking
# path idioms) instead of only the engine. Copy-in: it fetches the pinned guard bundle at run time,
# so there is no cross-repo reusable to resolve (private->private `uses:` fails under enterprise
# Actions policy).
name: ORC Code Guards

on:
  pull_request:

permissions:
  contents: read

jobs:
  orc-code-guards:
    # GitHub-hosted Ubuntu is the adopter default. To opt into self-hosted,
    # replace with your runner-label JSON array, for example:
    # ["self-hosted","macOS","ARM64"]
    runs-on: ubuntu-latest
    steps:
      - name: Check out this repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "20"
      - name: Fetch + run orc adopter guards (pinned v7.17.0)
        shell: bash
        env:
          # orc is a PRIVATE repo: the workflow-scoped GITHUB_TOKEN is limited to THIS repo and cannot
          # read orc. Provide a PAT or GitHub App installation token with read access to
          # ABD-Enterprises/orc as the ORC_GUARDS_TOKEN secret. (If orc is public to you, github.token
          # works and the secret can be omitted.) The token is masked in logs.
          ORC_GUARDS_TOKEN: ${{ secrets.ORC_GUARDS_TOKEN || github.token }}
        run: |
          set -euo pipefail
          # Fetch the guard bundle OUTSIDE the workspace: the guards walk --root recursively, and the
          # bundle carries their own detection-pattern fixtures — nesting it inside the scanned tree
          # would make a clean repo fail. RUNNER_TEMP is outside GITHUB_WORKSPACE.
          bundle="${RUNNER_TEMP}/orc-guards"
          rm -rf "$bundle"
          git clone --depth 1 --filter=blob:none --sparse --branch "v7.17.0" \
            "https://x-access-token:${ORC_GUARDS_TOKEN}@github.com/ABD-Enterprises/orc.git" "$bundle"
          git -C "$bundle" sparse-checkout set tools/validators
          node "$bundle/tools/validators/run-adopter-guards.mjs" --root "$GITHUB_WORKSPACE" --ref "v7.17.0"
