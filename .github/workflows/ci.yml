name: CI

on:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  guardrails:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin "${{ github.base_ref }}" --depth=1

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Bootstrap repo
        run: npm run setup

      - name: Run runtime guardrails validator
        run: node ./tools/validators/enforce-runtime-guardrails.js --base "origin/${{ github.base_ref }}"

      - name: Run repo tests
        run: npm run test

      - name: Run desktop build
        run: npm --prefix ./apps/desktop run build
