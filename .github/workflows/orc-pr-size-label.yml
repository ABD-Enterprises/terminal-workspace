# Generated by orc adopt --with-workflows from orc-standards@v7.17.0 — overwrite via 'orc adopt --force --with-workflows'.
# Do not hand-edit; tracked drift will be detected by 'orc adopt' on the next run.
# Implements ORC policy essential 8: right-sized PRs.
#
# When a PR exceeds either size cap (> 15 changed files OR > 400 LOC net,
# excluding lockfiles, generated files, and pure renames), this workflow:
#   1. Applies the `size:xl` label (signal for reviewers + auto-merge gate)
#   2. Reads explicit mechanical-scope metadata from the PR label
#      `scope:mechanical`, the PR body token `**Mechanical scope declared**`,
#      or the linked ticket body token, posts a notice, and does NOT add
#      `needs-independent-review`. Otherwise adds
#      `needs-independent-review`, which `orc-auto-merge.yml`'s
#      BLOCKED_LABELS already blocks on until a reviewer removes it.
#   3. If the diff later shrinks under both caps, removes `size:xl`. Does
#      NOT auto-remove `needs-independent-review` — that may have been added
#      for other reasons and is the reviewer's call to clear.
#
# Exclusions (don't count toward the caps):
#   - *.lock, package-lock.json, pnpm-lock.yaml, yarn.lock, Cargo.lock,
#     poetry.lock, Gemfile.lock, composer.lock, uv.lock, bun.lockb
#   - *.generated.*, *.gen.*, *_pb2.py, *_pb.go (generated code)
#   - Pure renames (R100 in git diff --find-renames)
name: ORC PR size label
on:
  pull_request_target:
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  # Per-PR grouping so a newer push cancels in-flight runs on the same PR/ref.
  group: orc-pr-size-label-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  size-label:
    # GitHub-hosted Ubuntu is the adopter default. To opt into self-hosted,
    # replace with your runner-label JSON array, for example:
    # ["self-hosted","macOS","ARM64"]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event.pull_request != null
    env:
      BASH_ENV: ""
    defaults:
      run:
        shell: bash --noprofile --norc -eo pipefail {0}
    steps:
      - name: Compute size and decide labels
        id: size
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          files_tsv=$(gh api --paginate "repos/$REPO/pulls/$PR_NUMBER/files?per_page=100" \
            --jq '.[] | [.filename, .status, .additions, .deletions] | @tsv')

          exclude_re='(^|/)(package-lock\.json|pnpm-lock\.yaml|yarn\.lock|Cargo\.lock|poetry\.lock|Gemfile\.lock|composer\.lock|uv\.lock|bun\.lockb)$|\.lock$|\.generated\.|\.gen\.|_pb2\.py$|_pb\.go$'

          files=0
          loc=0
          while IFS=$'\t' read -r path status added deleted; do
            [ -z "${path:-}" ] && continue
            # Pure renames do not consume review budget for the size cap.
            if [ "$status" = "renamed" ] && [ "$added" = "0" ] && [ "$deleted" = "0" ]; then continue; fi
            if echo "$path" | grep -qE "$exclude_re"; then continue; fi
            files=$((files + 1))
            loc=$((loc + added + deleted))
          done <<<"$files_tsv"

          echo "files=$files" >>"$GITHUB_OUTPUT"
          echo "loc=$loc" >>"$GITHUB_OUTPUT"

          is_xl=false
          if [ "$files" -gt 15 ] || [ "$loc" -gt 400 ]; then
            is_xl=true
          fi
          echo "is_xl=$is_xl" >>"$GITHUB_OUTPUT"

          mechanical=false
          mechanical_source=none
          pr_body=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json body --jq .body 2>/dev/null || echo "")
          pr_labels_csv=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json labels --jq '[.labels[].name] | join(",")' 2>/dev/null || echo "")
          if echo ",$pr_labels_csv," | grep -q ',scope:mechanical,'; then
            mechanical=true
            mechanical_source=pr-label
          elif echo "$pr_body" | grep -qE '^\*\*Mechanical scope declared\*\*[[:space:]]*$'; then
            mechanical=true
            mechanical_source=pr-body
          else
            linked_n=$(echo "$pr_body" | grep -iEo '(close[sd]?|fix(e[sd])?|resolve[sd]?)[[:space:]]+#[0-9]+' | head -1 | grep -Eo '[0-9]+' || true)
          fi
          if [ "$mechanical" = "false" ] && [ -n "${linked_n:-}" ]; then
            issue_body=$(gh issue view "$linked_n" --repo "$REPO" --json body --jq .body 2>/dev/null || echo "")
            if echo "$issue_body" | grep -qE '^\*\*Mechanical scope declared\*\*[[:space:]]*$'; then
              mechanical=true
              mechanical_source=ticket-body
            fi
          fi
          echo "mechanical=$mechanical" >>"$GITHUB_OUTPUT"
          echo "mechanical_source=$mechanical_source" >>"$GITHUB_OUTPUT"

          echo "::notice::size files=$files loc=$loc is_xl=$is_xl mechanical=$mechanical mechanical_source=$mechanical_source"

      - name: Apply / remove size:xl
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          IS_XL: ${{ steps.size.outputs.is_xl }}
          MECHANICAL: ${{ steps.size.outputs.mechanical }}
          MECHANICAL_SOURCE: ${{ steps.size.outputs.mechanical_source }}
          FILES: ${{ steps.size.outputs.files }}
          LOC: ${{ steps.size.outputs.loc }}
        shell: bash
        run: |
          set -euo pipefail
          labels_csv=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json labels --jq '[.labels[].name] | join(",")')

          has_xl=false
          if echo ",$labels_csv," | grep -q ',size:xl,'; then has_xl=true; fi

          has_nir=false
          if echo ",$labels_csv," | grep -q ',needs-independent-review,'; then has_nir=true; fi

          if [ "$IS_XL" = "true" ]; then
            if [ "$has_xl" = "false" ]; then
              gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label "size:xl"
            fi
            if [ "$MECHANICAL" = "true" ]; then
              if [ "$has_nir" = "false" ]; then
                comment="<!-- orc-pr-size-label:notice -->\n**PR size: \`size:xl\` (files=$FILES, loc=$LOC)** — mechanical scope exemption declared via \`$MECHANICAL_SOURCE\`. \`needs-independent-review\` will not be auto-applied. Reviewer judgement still encouraged."
                gh pr comment "$PR_NUMBER" --repo "$REPO" --body "$(printf '%b' "$comment")" || true
              fi
            else
              if [ "$has_nir" = "false" ]; then
                gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label "needs-independent-review" || true
                comment="<!-- orc-pr-size-label:escalation -->\n**PR size: \`size:xl\` (files=$FILES, loc=$LOC)** — exceeds ORC policy essential 8 caps. Added \`needs-independent-review\`; reviewer removes after independent review per ORC policy auto-merge gate."
                gh pr comment "$PR_NUMBER" --repo "$REPO" --body "$(printf '%b' "$comment")" || true
              fi
            fi
          else
            if [ "$has_xl" = "true" ]; then
              gh pr edit "$PR_NUMBER" --repo "$REPO" --remove-label "size:xl"
              # Do NOT auto-remove needs-independent-review; may have been added for other reasons.
            fi
          fi
