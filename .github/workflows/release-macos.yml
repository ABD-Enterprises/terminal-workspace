name: Release macOS

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Git tag to publish
        required: true
        type: string
      release_channel:
        description: Promotion channel
        required: false
        default: stable
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-macos:
    # Self-hosted ABD-Enterprises org runner with Xcode 26.5 and
    # Apple Silicon. Declared in deffenda/brew-sync
    # manifests/github-runners.yaml. macos-latest hosted runners
    # carry a 10x minute multiplier and this job has a 90-minute
    # timeout — moving it to self-hosted is a material savings on
    # every release.
    #
    # Signing secrets are still injected by GitHub at run time; the
    # workflow's "Import signing certificate" step builds an isolated
    # $RUNNER_TEMP keychain per run, so this is safe to run on a
    # shared dev machine without polluting the user's login keychain.
    #
    # To temporarily route a release back to GitHub-hosted (e.g. if
    # the runner is offline), change this single line back to
    # `macos-latest` and re-run; no other workflow step depends on
    # the runner kind.
    runs-on: [self-hosted, macOS, ARM64]
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Resolve release metadata
        id: release_meta
        shell: bash
        env:
          RELEASE_CHANNEL_INPUT: ${{ github.event.inputs.release_channel }}
          RELEASE_TAG_INPUT: ${{ github.event.inputs.release_tag }}
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "tag=$RELEASE_TAG_INPUT" >> "$GITHUB_OUTPUT"
            echo "channel=$RELEASE_CHANNEL_INPUT" >> "$GITHUB_OUTPUT"
            echo "target=$GITHUB_SHA" >> "$GITHUB_OUTPUT"
          elif [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            echo "tag=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"
            echo "channel=stable" >> "$GITHUB_OUTPUT"
            echo "target=$GITHUB_SHA" >> "$GITHUB_OUTPUT"
          else
            VERSION="$(node -p "require('./package.json').version")"
            echo "tag=v${VERSION}-verify.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
            echo "channel=preview" >> "$GITHUB_OUTPUT"
            echo "target=$GITHUB_SHA" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: stable

      - name: Bootstrap repo
        run: npm run setup

      - name: Validate release secrets
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
          MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_ISSUER: ${{ secrets.MACOS_NOTARY_ISSUER }}
          MACOS_NOTARY_KEY_BASE64: ${{ secrets.MACOS_NOTARY_KEY_BASE64 }}
          MACOS_NOTARY_APPLE_ID: ${{ secrets.MACOS_NOTARY_APPLE_ID }}
          MACOS_NOTARY_APP_PASSWORD: ${{ secrets.MACOS_NOTARY_APP_PASSWORD }}
          MACOS_NOTARY_TEAM_ID: ${{ secrets.MACOS_NOTARY_TEAM_ID }}
        run: npm run release:secrets:validate-env

      - name: Import Developer ID certificate
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        shell: bash
        run: |
          if [[ -z "$MACOS_CERTIFICATE_P12_BASE64" || -z "$MACOS_CERTIFICATE_PASSWORD" || -z "$MACOS_KEYCHAIN_PASSWORD" ]]; then
            echo "Missing one or more required signing secrets." >&2
            exit 1
          fi

          CERT_PATH="$RUNNER_TEMP/termsnip-signing.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/termsnip-signing.keychain-db"

          MACOS_CERTIFICATE_P12_BASE64="$MACOS_CERTIFICATE_P12_BASE64" CERT_PATH="$CERT_PATH" python3 <<'PY'
          import base64
          import os
          from pathlib import Path

          Path(os.environ["CERT_PATH"]).write_bytes(
              base64.b64decode(os.environ["MACOS_CERTIFICATE_P12_BASE64"])
          )
          PY
          security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$MACOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Build signed release bundle
        env:
          MACOS_SIGN_MODE: require
          MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
        run: npm run native:release:check

      - name: Notarize signed bundle
        env:
          MACOS_SIGN_MODE: require
          MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_ISSUER: ${{ secrets.MACOS_NOTARY_ISSUER }}
          MACOS_NOTARY_KEY_BASE64: ${{ secrets.MACOS_NOTARY_KEY_BASE64 }}
          MACOS_NOTARY_APPLE_ID: ${{ secrets.MACOS_NOTARY_APPLE_ID }}
          MACOS_NOTARY_APP_PASSWORD: ${{ secrets.MACOS_NOTARY_APP_PASSWORD }}
          MACOS_NOTARY_TEAM_ID: ${{ secrets.MACOS_NOTARY_TEAM_ID }}
        run: npm run native:notarize

      - name: Promote notarized release
        env:
          MACOS_RELEASE_CHANNEL: ${{ steps.release_meta.outputs.channel }}
          # #86: updater feed signing. When these are set, native:promote emits
          # a signed .app.tar.gz + latest.json into the promotion dir (uploaded
          # by the publish step). Absent, promotion skips updater artifacts.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: npm run native:promote

      - name: Publish GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.tag }}
          RELEASE_TARGET: ${{ steps.release_meta.outputs.target }}
          MACOS_RELEASE_CHANNEL: ${{ steps.release_meta.outputs.channel }}
        run: npm run native:publish

      - name: Upload promoted release artifacts
        if: always() && hashFiles('artifacts/release/**') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: macos-release-${{ steps.release_meta.outputs.tag }}
          if-no-files-found: error
          path: |
            artifacts/release
