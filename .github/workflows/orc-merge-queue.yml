# Generated by orc adopt --with-workflows from v7.17.0.
name: ORC Merge Queue

on:
  # Direct triggers so the copy-in (air-gapped) variant runs standalone in the consumer
  # repo: merge_group is the merge-queue check; pull_request validates PRs pre-queue.
  merge_group:
  pull_request:

permissions:
  contents: read

jobs:
  orc-merge-queue:
    # GitHub-hosted Ubuntu is the adopter default. To opt into self-hosted,
    # replace with your runner-label JSON array, for example:
    # ["self-hosted","macOS","ARM64"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "20"
      - name: Repo verify gate
        shell: bash
        run: |
          if [ -f scripts/verify.sh ]; then
            bash scripts/verify.sh
          else
            echo "scripts/verify.sh not present; ORC merge queue check is a portable placeholder."
          fi
