# Generated by orc adopt --with-workflows from orc-standards@v7.17.0 — overwrite via 'orc adopt --force --with-workflows'.
# Do not hand-edit; tracked drift will be detected by 'orc adopt' on the next run.
# Implements ORC policy merge-override discipline + ORC policy mechanism tier 2:
# when a PR merges with a required branch-protection check in a
# non-SUCCESS terminal state at merge time (admin override or
# auto-merge-without-required-checks), post a `merge_override:` note on
# the linked issue so the ORC policy evidence trail captures the override.
#
# Behavior:
#   - Triggers on pull_request.closed events ONLY when the PR was merged.
#   - Looks up the default branch's required checks via the branch
#     protection API. If none configured, exits (nothing to audit).
#   - Walks the merge SHA's check-runs + statuses; identifies any
#     required check whose conclusion is FAILURE/TIMED_OUT/CANCELLED/
#     ACTION_REQUIRED at merge time (per ticket #161 recommendation b —
#     false-positive-free).
#   - If override detected, resolves the linked issue (via PR body
#     "Closes #N" / "Fixes #N") and posts the `merge_override:` note
#     there. Idempotent: skips if already posted on this issue for this
#     PR.
#   - If the linked issue carries `override-documented` label, the note
#     references that acknowledgement and still records the trail.
#
# Read-only on labels and PR/issue state; only POSTS one comment on the
# linked issue per detected override. The override itself remains
# allowed — the trail is the deliverable, not a new block.
name: ORC merge-override note
on:
  pull_request_target:
    types: [closed]

permissions:
  contents: read
  pull-requests: read
  issues: write

concurrency:
  # Per-PR grouping so a newer push cancels in-flight runs on the same PR/ref.
  group: orc-merge-override-note-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  audit:
    # GitHub-hosted Ubuntu is the adopter default. To opt into self-hosted,
    # replace with your runner-label JSON array, for example:
    # ["self-hosted","macOS","ARM64"]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event.pull_request != null && github.event.pull_request.merged == true
    env:
      BASH_ENV: ""
    defaults:
      run:
        shell: bash --noprofile --norc -eo pipefail {0}
    steps:
      - name: Detect override and post note on linked issue
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          MERGED_BY: ${{ github.event.pull_request.merged_by.login }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        shell: bash
        run: |
          set -euo pipefail

          # Resolve default branch + required checks
          default_branch=$(gh api "repos/$REPO" --jq '.default_branch' 2>/dev/null || echo "main")
          required=$(gh api "repos/$REPO/branches/$default_branch/protection" --jq '.required_status_checks.contexts[]?' 2>/dev/null || true)
          if [ -z "$required" ]; then
            echo "::notice::no required_status_checks configured; nothing to audit"
            exit 0
          fi

          # Walk check-runs + statuses at the head SHA
          runs=$(gh api "repos/$REPO/commits/$HEAD_SHA/check-runs?per_page=100" --jq '.check_runs[]? | "\(.name)|\(.conclusion // "")"' 2>/dev/null || true)
          statuses=$(gh api "repos/$REPO/commits/$HEAD_SHA/statuses?per_page=100" --jq '.[]? | "\(.context)|\(.state // "")"' 2>/dev/null || true)

          failed=$(python3 - "$required" "$runs" "$statuses" <<'PY'
          import sys
          required = set(filter(None, sys.argv[1].split('\n')))
          runs_raw, statuses_raw = sys.argv[2], sys.argv[3]
          def parse(text):
              out = {}
              for line in text.splitlines():
                  if '|' not in line: continue
                  name, conc = line.split('|', 1)
                  out.setdefault(name, conc)
              return out
          runs = parse(runs_raw); statuses = parse(statuses_raw)
          non_success = {"failure","FAILURE","timed_out","TIMED_OUT","cancelled","CANCELLED","action_required","ACTION_REQUIRED","startup_failure","STARTUP_FAILURE","error","ERROR"}
          hits = []
          for name in required:
              conc = runs.get(name, statuses.get(name, ""))
              if conc in non_success:
                  hits.append(f"{name}={conc}")
          print('\n'.join(hits))
          PY
          )
          if [ -z "$failed" ]; then
            echo "::notice::all required checks SUCCESS at merge time; no override"
            exit 0
          fi

          # Resolve linked issue via PR body (Closes/Fixes/Resolves #N)
          pr_body=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json body --jq .body 2>/dev/null || echo "")
          linked_issue=$(echo "$pr_body" | grep -oiE '(closes|fixes|resolves)[[:space:]]+#[0-9]+' | head -1 | grep -oE '[0-9]+' || true)
          if [ -z "$linked_issue" ]; then
            echo "::warning::override detected but no linked issue in PR body; trail won't land. Failed: $failed"
            exit 0
          fi

          # Idempotency: skip if our note already exists on the issue for this PR
          marker="<!-- orc-merge-override:pr-${PR_NUMBER} -->"
          existing=$(gh issue view "$linked_issue" --repo "$REPO" --json comments --jq ".comments | map(select(.body | contains(\"$marker\"))) | length" 2>/dev/null || echo "0")
          if [ "${existing:-0}" != "0" ]; then
            echo "::notice::note already posted on issue #$linked_issue; skipping"
            exit 0
          fi

          # Check for override-documented label
          has_doc_label=$(gh issue view "$linked_issue" --repo "$REPO" --json labels --jq '.labels | map(.name) | any(. == "override-documented")' 2>/dev/null || echo "false")
          ack_note=""
          if [ "$has_doc_label" = "true" ]; then
            ack_note=$'\n\n_The `override-documented` label is set on this issue, so this note is recorded for trail only — operator acknowledged the override._'
          fi

          body=$(cat <<EOF
          $marker
          **Merge-override detected on PR #$PR_NUMBER** — per ORC policy merge-override discipline + ORC policy mechanism tier 2.

          \`\`\`
          merge_override: $failed
          reason: (operator: replace with one-line reason or add 'override-documented' label)
          merged_by: $MERGED_BY
          head_sha: $HEAD_SHA
          \`\`\`

          This issue is the ORC policy evidence anchor; the override itself remains permitted, but the audit trail must capture it. Add a follow-up comment naming the reason, or add the \`override-documented\` label to acknowledge.$ack_note
          EOF
          )
          gh issue comment "$linked_issue" --repo "$REPO" --body "$body"
          echo "::notice::merge-override note posted on issue #$linked_issue"
