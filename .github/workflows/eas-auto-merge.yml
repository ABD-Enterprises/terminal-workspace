# Generated by ai-pipeline adopt --with-workflows from enterprise-ai-standards@v7.0.1 — overwrite via 'ai-pipeline adopt --force --with-workflows'.
# Do not hand-edit; tracked drift will be detected by 'ai-pipeline adopt' on the next run.
name: EAS Auto-merge
on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review, labeled, unlabeled, edited]
  check_suite:
    types: [completed]
  pull_request_review:
    types: [submitted, dismissed]

# Permissions declared at the workflow level must be ≥ the reusable's
# top-level permissions or GitHub rejects the call as privilege-escalation
# BEFORE running. Matches reusable/auto-merge.yml's declared permissions.
permissions:
  contents: write
  pull-requests: write
  issues: read
  checks: read

jobs:
  call:
    uses: deffenda/enterprise-ai-standards/.github/workflows/reusable/auto-merge.yml@v7.0.1
    with:
      trusted_author_file: .github/auto-merge-allowed-authors
      blocked_labels: security,breaking-change,migration,needs-human-review,do-not-merge
      merge_method: squash
    secrets: inherit
