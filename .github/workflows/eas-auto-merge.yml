# Generated by ai-pipeline adopt --with-workflows from enterprise-ai-standards@v7.13.0 — overwrite via 'ai-pipeline adopt --force --with-workflows'.
# Do not hand-edit; tracked drift will be detected by 'ai-pipeline adopt' on the next run.
# Copy-in workflow — full logic inlined. v7.0.x reusable-workflow distribution was unreliable
# in this account configuration; v7.1.0 ships standalone workflows instead. See
# enterprise-ai-standards.md §B1 for the rationale.
#
# §B2 essential 8 coordination: eas-pr-size-label.yml owns the size:xl decision
# and adds `needs-independent-review` automatically when a PR exceeds the §B2
# size caps without a `**Mechanical scope declared**` token on the linked
# ticket. This template then blocks via BLOCKED_LABELS until the reviewer
# clears it. No additional logic required here.
name: EAS Auto-merge
on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review, labeled, unlabeled, edited]
  check_suite:
    types: [completed]
  pull_request_review:
    types: [submitted, dismissed]

permissions:
  contents: write
  pull-requests: write
  issues: write
  checks: read

env:
  TRUSTED_AUTHOR_FILE: .github/auto-merge-allowed-authors
  BLOCKED_LABELS: security,breaking-change,migration,needs-independent-review,do-not-merge
  MECHANICAL_SIGNATURES_JSON: '[{"name":"header-pin-bump-only","paths":[".github/workflows/eas-*.yml",".github/PULL_REQUEST_TEMPLATE.md",".github/pull_request_template.md",".gemini/config.yaml"],"diff":"eas-version-lines-only"},{"name":"generated-file-refresh-only","paths":["generated/**","**/generated/**","docs/generated/**","dist/**","build/generated/**","*.generated.*"],"diff":"file-list-only"},{"name":"label-set-refresh-only","paths":["tools/ai-pipeline/providers/github-setup.mjs","tools/ai-pipeline/test-canonical-labels.mjs","tools/audit-fleet-adoption.sh","tools/ai-pipeline/scripts/test-audit-fleet-adoption.sh","enterprise-ai-standards.md","CHANGELOG.md"],"diff":"file-list-only"}]'
  MERGE_METHOD: squash

jobs:
  evaluate:
    runs-on: ubuntu-latest
    if: github.event.pull_request != null || github.event.check_suite != null
    steps:
      - name: Validate inputs
        shell: bash
        run: |
          set -euo pipefail
          method="${{ env.MERGE_METHOD }}"
          case "$method" in
            squash|merge|rebase) ;;
            *)
              echo "::error::MERGE_METHOD must be one of squash|merge|rebase, got '$method'"
              exit 2
              ;;
          esac
          if [ -z "${{ env.TRUSTED_AUTHOR_FILE }}" ]; then
            echo "::error::TRUSTED_AUTHOR_FILE is empty"
            exit 2
          fi

      - name: Checkout PR head
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Resolve PR number
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          pr_number="${{ github.event.pull_request.number }}"
          if [ -z "$pr_number" ] || [ "$pr_number" = "null" ]; then
            head_sha="${{ github.event.check_suite.head_sha }}"
            if [ -z "$head_sha" ] || [ "$head_sha" = "null" ]; then
              echo "::notice::No PR number and no check_suite head_sha; nothing to evaluate"
              echo "skip=true" >>"$GITHUB_OUTPUT"
              exit 0
            fi
            pr_number=$(gh pr list --repo "$GITHUB_REPOSITORY" --search "$head_sha" --state open --json number --jq '.[0].number' || true)
            if [ -z "$pr_number" ] || [ "$pr_number" = "null" ]; then
              echo "::notice::check_suite head_sha $head_sha not associated with an open PR"
              echo "skip=true" >>"$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          echo "number=$pr_number" >>"$GITHUB_OUTPUT"
          echo "skip=false" >>"$GITHUB_OUTPUT"

      - name: §F7 budget pre-flight
        if: steps.pr.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f tools/ai-pipeline/cli.mjs ]; then
            echo "::notice::ai-pipeline CLI not present; skipping §F7 budget pre-flight"
            exit 0
          fi

          set +e
          node tools/ai-pipeline/cli.mjs rate-budget check --all-providers
          budget_exit=$?
          set -e
          case "$budget_exit" in
            0|10|20)
              # Auto-merge finishes already-reviewed work. Only HALT stops the merge worker.
              exit 0
              ;;
            30)
              echo "::error::Halted by §F7 budget circuit breaker before auto-merge work."
              exit 30
              ;;
            2)
              echo "::error::rate-budget pre-flight usage/config error"
              exit 2
              ;;
            *)
              echo "::error::rate-budget pre-flight failed with unexpected exit $budget_exit"
              exit "$budget_exit"
              ;;
          esac

      - name: Evaluate gates
        if: steps.pr.outputs.skip != 'true'
        id: gates
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        shell: bash
        run: |
          set -euo pipefail

          repo="$GITHUB_REPOSITORY"
          pr_number="$PR_NUMBER"

          pr_json=$(gh pr view "$pr_number" --repo "$repo" --json \
            number,headRefOid,baseRefName,isDraft,author,labels,body,reviewDecision)

          head_sha=$(jq -r '.headRefOid' <<<"$pr_json")
          base_ref=$(jq -r '.baseRefName' <<<"$pr_json")
          is_draft=$(jq -r '.isDraft' <<<"$pr_json")
          author_login=$(jq -r '.author.login' <<<"$pr_json")
          labels_csv=$(jq -r '[.labels[].name] | join(",")' <<<"$pr_json")
          pr_body=$(jq -r '.body // ""' <<<"$pr_json")

          declare -A failures=()

          if [ "$is_draft" = "true" ]; then
            failures[draft]="PR is a draft. Set the pull request to Ready for review to enable auto-merge."
          fi

          if [ "$base_ref" != "main" ]; then
            failures[base_ref]="PR base ref is '$base_ref', expected 'main'. Auto-merge only targets main."
          fi

          has_mechanical_sweep=false
          if echo ",$labels_csv," | grep -q ',chore:mechanical-sweep,'; then
            has_mechanical_sweep=true
          fi

          mechanical_fast_path=false
          mechanical_signature=""
          if [ "$has_mechanical_sweep" = true ]; then
            changed_files=$(mktemp)
            pr_diff=$(mktemp)
            gh pr diff "$pr_number" --repo "$repo" --name-only >"$changed_files"
            gh pr diff "$pr_number" --repo "$repo" --patch >"$pr_diff"

            match_any_pattern() {
              local file="$1"
              local patterns="$2"
              local pattern
              while IFS= read -r pattern; do
                [ -z "$pattern" ] && continue
                # shellcheck disable=SC2254
                case "$file" in
                  $pattern) return 0 ;;
                esac
              done <<<"$patterns"
              return 1
            }

            files_match_patterns() {
              local patterns="$1"
              local file
              [ -s "$changed_files" ] || return 1
              while IFS= read -r file; do
                [ -z "$file" ] && continue
                if ! match_any_pattern "$file" "$patterns"; then
                  return 1
                fi
              done <"$changed_files"
              return 0
            }

            diff_is_header_pin_only() {
              # shellcheck disable=SC2016
              awk '
                /^diff --git / || /^index / || /^--- / || /^\+\+\+ / || /^@@ / { next }
                /^[+-]/ {
                  if ($0 !~ /enterprise-ai-standards@v[0-9]+\.[0-9]+\.[0-9]+/) bad=1
                }
                END { exit bad ? 1 : 0 }
              ' "$pr_diff"
            }

            while IFS= read -r signature; do
              name=$(jq -r '.name' <<<"$signature")
              mode=$(jq -r '.diff' <<<"$signature")
              patterns=$(jq -r '.paths[]' <<<"$signature")
              if ! files_match_patterns "$patterns"; then
                continue
              fi
              if [ "$mode" = "eas-version-lines-only" ] && ! diff_is_header_pin_only; then
                continue
              fi
              mechanical_fast_path=true
              mechanical_signature="$name"
              break
            done < <(jq -c '.[]' <<<"$MECHANICAL_SIGNATURES_JSON")
          fi

          if [ "$has_mechanical_sweep" = true ] && [ "$mechanical_fast_path" != true ]; then
            failures[mechanical_signature]="PR carries chore:mechanical-sweep but changed files do not match a registered mechanical signature."
          fi

          IFS=',' read -ra blocked_arr <<<"$BLOCKED_LABELS"
          blocking=()
          for lbl in "${blocked_arr[@]}"; do
            lbl_trimmed=$(echo "$lbl" | xargs)
            [ -z "$lbl_trimmed" ] && continue
            if [ "$mechanical_fast_path" = true ] && [ "$lbl_trimmed" = "needs-independent-review" ]; then
              continue
            fi
            if echo ",$labels_csv," | grep -q ",${lbl_trimmed},"; then
              blocking+=("$lbl_trimmed")
            fi
          done
          if [ ${#blocking[@]} -gt 0 ]; then
            failures[blocked_labels]="PR carries blocking labels: ${blocking[*]}"
          fi

          if [ ! -f "$TRUSTED_AUTHOR_FILE" ]; then
            failures[trusted_author]="trusted_author_file '$TRUSTED_AUTHOR_FILE' not found in this checkout."
          else
            if ! grep -E '^[^#]' "$TRUSTED_AUTHOR_FILE" | sed 's/[[:space:]]//g' | grep -Fxq "$author_login"; then
              failures[trusted_author]="PR author '$author_login' is not listed in $TRUSTED_AUTHOR_FILE."
            fi
          fi

          linked_issue=""
          if echo "$pr_body" | grep -iEo '(close[sd]?|fix(e[sd])?|resolve[sd]?)[[:space:]]+#[0-9]+' >/dev/null; then
            linked_issue=$(echo "$pr_body" | grep -iEo '(close[sd]?|fix(e[sd])?|resolve[sd]?)[[:space:]]+#[0-9]+' | head -1 | grep -Eo '[0-9]+')
          fi
          has_chore_trivial=false
          if echo ",$labels_csv," | grep -q ',chore:trivial,'; then
            has_chore_trivial=true
          fi
          if [ -z "$linked_issue" ] && [ "$has_chore_trivial" != true ]; then
            failures[linked_issue]="PR body must contain 'Closes/Fixes/Resolves #N' or carry the 'chore:trivial' label."
          fi

          if [ -n "$linked_issue" ]; then
            issue_body=$(gh issue view "$linked_issue" --repo "$repo" --json body --jq .body 2>/dev/null || echo "")
            unchecked=$(echo "$issue_body" | grep -cE '^\s*-\s*\[ \]' || true)
            if [ "$unchecked" -gt 0 ]; then
              failures[ac_checkboxes]="Linked issue #$linked_issue has $unchecked unchecked acceptance-criteria boxes."
            fi
          fi

          review_threads_json="[]"
          cursor=null
          while :; do
            threads_page=$(gh api graphql -f query='
              query($owner:String!,$name:String!,$number:Int!,$cursor:String){
                repository(owner:$owner,name:$name){
                  pullRequest(number:$number){
                    reviewThreads(first:100, after:$cursor){
                      nodes{ isResolved }
                      pageInfo{ hasNextPage endCursor }
                    }
                  }
                }
              }' \
              -F owner="${repo%/*}" \
              -F name="${repo#*/}" \
              -F number="$pr_number" \
              -F cursor="$cursor")
            review_threads_json=$(jq -c --argjson acc "$review_threads_json" \
              '$acc + (.data.repository.pullRequest.reviewThreads.nodes // [])' <<<"$threads_page")
            has_next=$(jq -r '.data.repository.pullRequest.reviewThreads.pageInfo.hasNextPage' <<<"$threads_page")
            if [ "$has_next" != "true" ]; then
              break
            fi
            cursor=$(jq -r '.data.repository.pullRequest.reviewThreads.pageInfo.endCursor // "null"' <<<"$threads_page")
            if [ "$cursor" = "null" ]; then
              echo "::error::reviewThreads pagination reported another page without an endCursor"
              exit 1
            fi
          done
          unresolved=$(jq '[.[] | select(.isResolved==false)] | length' <<<"$review_threads_json")
          if [ "$unresolved" -gt 0 ]; then
            failures[review_threads]="$unresolved unresolved review thread(s) on this PR."
          fi

          checks_json=$(gh pr checks "$pr_number" --repo "$repo" --json name,state,bucket 2>/dev/null || echo "[]")
          failing=$(jq '[.[] | select(.bucket=="fail" or .bucket=="cancel")] | length' <<<"$checks_json")
          pending=$(jq '[.[] | select(.bucket=="pending")] | length' <<<"$checks_json")
          if [ "$failing" -gt 0 ]; then
            failures[ci_green]="$failing required check(s) are failing on $head_sha."
          elif [ "$pending" -gt 0 ]; then
            failures[ci_green]="$pending required check(s) still pending on $head_sha; will retry on next check_suite event."
          fi

          if [ ${#failures[@]} -eq 0 ]; then
            echo "all_green=true" >>"$GITHUB_OUTPUT"
            echo "mechanical_signature=$mechanical_signature" >>"$GITHUB_OUTPUT"
          else
            echo "all_green=false" >>"$GITHUB_OUTPUT"
            echo "mechanical_signature=$mechanical_signature" >>"$GITHUB_OUTPUT"
          fi

          json="{"
          first=true
          for k in "${!failures[@]}"; do
            v=${failures[$k]}
            # shellcheck disable=SC2016
            v_esc=$(jq -Rn --arg v "$v" '$v')
            if [ "$first" = true ]; then first=false; else json+=","; fi
            json+="\"$k\":$v_esc"
          done
          json+="}"
          {
            echo "failures<<EOF"
            echo "$json"
            echo "EOF"
          } >>"$GITHUB_OUTPUT"

      - name: Enable auto-merge
        if: steps.pr.outputs.skip != 'true' && steps.gates.outputs.all_green == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        shell: bash
        run: |
          set -euo pipefail
          gh pr merge "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" \
            --auto "--${{ env.MERGE_METHOD }}" --delete-branch

      - name: Post gate failure comments
        if: steps.pr.outputs.skip != 'true' && steps.gates.outputs.all_green == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          FAILURES_JSON: ${{ steps.gates.outputs.failures }}
        shell: bash
        run: |
          set -euo pipefail
          repo="$GITHUB_REPOSITORY"
          # shellcheck disable=SC2016
          existing=$(gh pr view "$PR_NUMBER" --repo "$repo" --json comments \
            --jq '[.comments[].body | select(test("eas-auto-merge:gate-"))] | join("\n---\n")')

          for gate in $(jq -r 'keys[]' <<<"$FAILURES_JSON"); do
            msg=$(jq -r --arg k "$gate" '.[$k]' <<<"$FAILURES_JSON")
            marker="<!-- eas-auto-merge:gate-$gate -->"
            if echo "$existing" | grep -qF "$marker"; then
              continue
            fi
            body=$(printf "%s\n\n**Auto-merge gate failed:** \`%s\`\n\n%s\n" "$marker" "$gate" "$msg")
            gh pr comment "$PR_NUMBER" --repo "$repo" --body "$body"
          done
