# Generated by ai-pipeline adopt --with-workflows from enterprise-ai-standards@v7.13.0 — overwrite via 'ai-pipeline adopt --force --with-workflows'.
# Do not hand-edit; tracked drift will be detected by 'ai-pipeline adopt' on the next run.
# Implements §B2 essential 8: right-sized PRs.
#
# When a PR exceeds either size cap (> 15 changed files OR > 400 LOC net,
# excluding lockfiles, generated files, and pure renames), this workflow:
#   1. Applies the `size:xl` label (signal for reviewers + auto-merge gate)
#   2. Reads the linked ticket body; if it contains the literal token
#      `**Mechanical scope declared**` on its own line, posts a notice and
#      does NOT add `needs-independent-review`. Otherwise adds
#      `needs-independent-review`, which `eas-auto-merge.yml`'s
#      BLOCKED_LABELS already blocks on until a reviewer removes it.
#   3. If the diff later shrinks under both caps, removes `size:xl`. Does
#      NOT auto-remove `needs-independent-review` — that may have been added
#      for other reasons and is the reviewer's call to clear.
#
# Exclusions (don't count toward the caps):
#   - *.lock, package-lock.json, pnpm-lock.yaml, yarn.lock, Cargo.lock,
#     poetry.lock, Gemfile.lock, composer.lock, uv.lock, bun.lockb
#   - *.generated.*, *.gen.*, *_pb2.py, *_pb.go (generated code)
#   - Pure renames (R100 in git diff --find-renames)
name: EAS PR size label
on:
  pull_request_target:
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  size-label:
    runs-on: ubuntu-latest
    if: github.event.pull_request != null
    steps:
      - name: Checkout base for diff
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Fetch PR head
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=200 origin "+refs/pull/${PR_NUMBER}/head:refs/remotes/pr/${PR_NUMBER}"

      - name: Compute size and decide labels
        id: size
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        shell: bash
        run: |
          set -euo pipefail
          head_ref="refs/remotes/pr/${PR_NUMBER}"

          # Numstat-with-renames; renamed-only entries appear as "0\t0\torig => new"
          # We use --find-renames=100 (pure rename only) to exclude renames from
          # the LOC count, then re-count files excluding lockfiles/generated.
          numstat=$(git diff --numstat --find-renames=100 "$BASE_SHA" "$head_ref" || true)

          exclude_re='(^|/)(package-lock\.json|pnpm-lock\.yaml|yarn\.lock|Cargo\.lock|poetry\.lock|Gemfile\.lock|composer\.lock|uv\.lock|bun\.lockb)$|\.lock$|\.generated\.|\.gen\.|_pb2\.py$|_pb\.go$'

          files=0
          loc=0
          while IFS=$'\t' read -r added deleted path; do
            [ -z "${path:-}" ] && continue
            # rename-only lines (numstat shows added=deleted=0 for pure renames)
            if [ "$added" = "-" ] || [ "$deleted" = "-" ]; then continue; fi
            if echo "$path" | grep -qE "$exclude_re"; then continue; fi
            files=$((files + 1))
            loc=$((loc + added + deleted))
          done <<<"$numstat"

          echo "files=$files" >>"$GITHUB_OUTPUT"
          echo "loc=$loc" >>"$GITHUB_OUTPUT"

          is_xl=false
          if [ "$files" -gt 15 ] || [ "$loc" -gt 400 ]; then
            is_xl=true
          fi
          echo "is_xl=$is_xl" >>"$GITHUB_OUTPUT"

          # Check linked ticket for mechanical-scope declaration.
          mechanical=false
          pr_body=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json body --jq .body 2>/dev/null || echo "")
          linked_n=$(echo "$pr_body" | grep -iEo '(close[sd]?|fix(e[sd])?|resolve[sd]?)[[:space:]]+#[0-9]+' | head -1 | grep -Eo '[0-9]+' || true)
          if [ -n "${linked_n:-}" ]; then
            issue_body=$(gh issue view "$linked_n" --repo "$REPO" --json body --jq .body 2>/dev/null || echo "")
            if echo "$issue_body" | grep -qE '^\*\*Mechanical scope declared\*\*[[:space:]]*$'; then
              mechanical=true
            fi
          fi
          echo "mechanical=$mechanical" >>"$GITHUB_OUTPUT"

          echo "::notice::size files=$files loc=$loc is_xl=$is_xl mechanical=$mechanical"

      - name: Apply / remove size:xl
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          IS_XL: ${{ steps.size.outputs.is_xl }}
          MECHANICAL: ${{ steps.size.outputs.mechanical }}
          FILES: ${{ steps.size.outputs.files }}
          LOC: ${{ steps.size.outputs.loc }}
        shell: bash
        run: |
          set -euo pipefail
          labels_csv=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json labels --jq '[.labels[].name] | join(",")')

          has_xl=false
          if echo ",$labels_csv," | grep -q ',size:xl,'; then has_xl=true; fi

          has_nir=false
          if echo ",$labels_csv," | grep -q ',needs-independent-review,'; then has_nir=true; fi

          if [ "$IS_XL" = "true" ]; then
            if [ "$has_xl" = "false" ]; then
              gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label "size:xl"
            fi
            if [ "$MECHANICAL" = "true" ]; then
              if [ "$has_nir" = "false" ]; then
                comment="<!-- eas-pr-size-label:notice -->\n**PR size: \`size:xl\` (files=$FILES, loc=$LOC)** — linked ticket carries \`**Mechanical scope declared**\`. \`needs-independent-review\` will not be auto-applied. Reviewer judgement still encouraged."
                gh pr comment "$PR_NUMBER" --repo "$REPO" --body "$(printf '%b' "$comment")" || true
              fi
            else
              if [ "$has_nir" = "false" ]; then
                gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label "needs-independent-review" || true
                comment="<!-- eas-pr-size-label:escalation -->\n**PR size: \`size:xl\` (files=$FILES, loc=$LOC)** — exceeds §B2 essential 8 caps. Added \`needs-independent-review\`; reviewer removes after independent review per §B2 / §B1 auto-merge gate."
                gh pr comment "$PR_NUMBER" --repo "$REPO" --body "$(printf '%b' "$comment")" || true
              fi
            fi
          else
            if [ "$has_xl" = "true" ]; then
              gh pr edit "$PR_NUMBER" --repo "$REPO" --remove-label "size:xl"
              # Do NOT auto-remove needs-independent-review; may have been added for other reasons.
            fi
          fi
