# Generated by orc adopt --with-workflows from orc-standards@v7.17.0 — overwrite via 'orc adopt --force --with-workflows'.
# Do not hand-edit; tracked drift will be detected by 'orc adopt' on the next run.
# Copy-in workflow — self-contained server-visible loop-run attestation check.
name: ORC Run Presence

on:
  pull_request:
    types: [opened, synchronize, reopened, edited, ready_for_review]
  merge_group:
    types: [checks_requested]

permissions:
  contents: read
  issues: read
  pull-requests: read

concurrency:
  group: orc-run-presence-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  run-presence:
    # GitHub-hosted Ubuntu is the adopter default. To opt into self-hosted,
    # replace with your runner-label JSON array, for example:
    # ["self-hosted","macOS","ARM64"]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      BASH_ENV: ""
    defaults:
      run:
        shell: bash --noprofile --norc -eo pipefail {0}
    steps:
      - name: Merge-group status producer
        if: github.event_name == 'merge_group'
        run: |
          echo "::notice::ORC run-presence is enforced on pull_request events where the PR number is available."

      - name: Check ticket run-presence attestation
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          pr_json=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json body,headRefName,labels)
          pr_body=$(jq -r '.body // ""' <<<"$pr_json")
          head_ref=$(jq -r '.headRefName // ""' <<<"$pr_json")

          # Exception-label waiver (#1606): a PR explicitly marked hand-authored (or trivial) is not a
          # loop bypass, so requiring this check never blocks legitimate manual work. Keep this list in
          # sync with run-presence-check's DEFAULT_RUN_PRESENCE_EXEMPT_LABELS. (Self-contained adopters
          # use these defaults; orc's own workflow calls `orc run-presence-check`, which also honors
          # config.run_presence.exempt_labels.)
          labels=$(jq -r '[.labels[]?.name] | join("\n")' <<<"$pr_json")
          for exempt in hand-authored human-authored chore:trivial; do
            if grep -qxF "$exempt" <<<"$labels"; then
              echo "::notice::run-presence-check: PR #$PR_NUMBER waived by the '$exempt' label (hand-authored exception)."
              exit 0
            fi
          done

          ticket_id=$(PR_BODY="$pr_body" HEAD_REF="$head_ref" python3 - <<'PY'
          import os
          import re

          body = os.environ.get("PR_BODY", "")
          head_ref = os.environ.get("HEAD_REF", "")
          match = re.search(r"\b(?:closes|fixes|resolves)\s+#(\d+)\b", body, re.I)
          if not match:
              match = re.match(r"^(\d+)(?:[-_/].*)?$", head_ref)
          if match:
              print(match.group(1))
          PY
          )

          if [ -z "$ticket_id" ]; then
            echo "::notice::PR #$PR_NUMBER has no linked ticket; run-presence is not required."
            exit 0
          fi

          comments_file="$RUNNER_TEMP/orc-run-presence-comments.txt"
          gh api "repos/$REPO/issues/$ticket_id/comments" --paginate --jq '.[].body' > "$comments_file"

          python3 - "$comments_file" "$ticket_id" <<'PY'
          import re
          import sys
          from pathlib import Path

          body = Path(sys.argv[1]).read_text(encoding="utf-8")
          ticket_id = sys.argv[2]
          for block in body.split("### ai-evidence")[1:]:
              type_match = re.search(r"^\s*-\s*type:\s*(.+)$", block, re.M)
              status_match = re.search(r"^\s*-\s*status:\s*(.+)$", block, re.M)
              evidence_type = type_match.group(1).strip() if type_match else ""
              status = status_match.group(1).strip().lower() if status_match else ""
              if evidence_type == "run-presence" and status == "passed":
                  print(f"run-presence-check: OK — ticket #{ticket_id} carries a run-presence attestation")
                  raise SystemExit(0)

          print(
              f"::error::run-presence-check: FAIL — ticket #{ticket_id} has no passing run-presence attestation. "
              "Land via 'orc finish-pr' so the loop run is recorded.",
              file=sys.stderr,
          )
          raise SystemExit(1)
          PY
