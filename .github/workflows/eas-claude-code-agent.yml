#
# Generated by ai-pipeline adopt --with-workflows from enterprise-ai-standards@v7.13.1 — overwrite via 'ai-pipeline adopt --force --with-workflows'.
# Do not hand-edit; tracked drift will be detected by 'ai-pipeline adopt' on the next run.
# Copy-in workflow — full logic inlined. See eas-auto-merge.yml header for rationale.
#
# Claude Code Cloud Agent — Claude implements tickets transitioned to `ai/ready-for-work`.
#
# Triggers (auto-fires only when the repo has opted in via the CLOUD_AGENT_ENABLED variable):
#   - Auto: when the `ai/ready-for-work` label is added to an issue
#   - Manual: workflow_dispatch with an issue number (use for dry-runs)
#
# Separation of duties (EAS §B3 Canonical AI PR Reviewer):
#   - This workflow lets Claude PLAN + IMPLEMENT.
#   - The REVIEWER is distinct:
#       * `build-test` (per-repo test suite) — automated
#       * `CodeQL` (if enabled per repo) — security scanner
#       * `eas-risk-label` — risk classification (from this standard)
#       * Gemini Code Assist — canonical AI PR reviewer (EAS §B3)
#       * Final merge approval: human, gated by branch protection
#
# Opt-in (per-repo):
#   gh variable set CLOUD_AGENT_ENABLED --body true
#
# Required secrets when opted in:
#   - CLAUDE_CODE_OAUTH_TOKEN (preferred) — Claude Pro/Max subscription token.
#       Generate locally with `claude setup-token`. Format: sk-ant-oat01-...
#       Subscription absorbs the cost (no pay-per-token).
#       Valid 1 year; re-run setup-token before expiry.
#
#   - ANTHROPIC_API_KEY (fallback) — pay-per-token API key. Only used if
#       CLAUDE_CODE_OAUTH_TOKEN is unset. ~$1-5 per ticket.
#
#   - PRS_PAT (recommended) — fine-grained PAT with `contents:write`,
#       `pull-requests:write`, `issues:write` on this repo. PRs opened with
#       GITHUB_TOKEN do NOT trigger downstream workflows (the EAS auto-merge
#       gate will stall waiting for CI). Falls back to GITHUB_TOKEN if unset.
#
# Per-repo customization:
#   The agent reads CLAUDE.md and AGENTS.md from the repo root. Customize
#   those files to teach the agent your repo's conventions, validation
#   commands, and hard rules. Do NOT hand-edit this workflow — it'll be
#   overwritten on the next `ai-pipeline adopt`.
#
# Cost matrix (per ticket):
#   OAuth (subscription):   $0 marginal
#   API key (pay-per-token): $1-5
#
# Disable on a per-repo basis: `gh variable set CLOUD_AGENT_ENABLED --body false`
# (the workflow file stays; only the gate flips).
#
name: EAS Claude Code Agent

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to claim (must have ai/ready-for-work label)'
        required: true
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: claude-agent-issue-${{ github.event.issue.number || inputs.issue_number }}
  cancel-in-progress: false

jobs:
  agent:
    # Gate 1: repo must have opted in via CLOUD_AGENT_ENABLED variable.
    # Gate 2: trigger must be the right label OR a manual dispatch.
    if: |
      vars.CLOUD_AGENT_ENABLED == 'true' &&
      (github.event_name == 'workflow_dispatch' ||
       (github.event_name == 'issues' && github.event.action == 'labeled' && github.event.label.name == 'ai/ready-for-work'))
    runs-on: [self-hosted, macOS, local-build]
    timeout-minutes: 60
    env:
      # Skip the runner user's shell init (PR #214 / #334 in brew-sync).
      BASH_ENV: ""
    defaults:
      run:
        shell: bash --noprofile --norc -eo pipefail {0}

    steps:
      - name: Resolve issue number
        id: issue
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_ISSUE_NUMBER: ${{ inputs.issue_number || '' }}
          EVENT_ISSUE_NUMBER: ${{ github.event.issue.number || '' }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "number=$DISPATCH_ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
          else
            echo "number=$EVENT_ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          fetch-depth: 0
          token: ${{ secrets.PRS_PAT || secrets.GITHUB_TOKEN }}

      # actions/setup-node hardcodes /Users/runner/... for its tool
      # cache and ignores RUNNER_TOOL_CACHE — fails on this self-hosted
      # runner where the runner user is `deffenda`. Use the
      # Homebrew-installed Node on the runner host instead.
      - name: Verify Node from Homebrew
        run: |
          node --version
          npm --version

      - name: Fetch issue details
        id: ticket
        env:
          GH_TOKEN: ${{ secrets.PRS_PAT || secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUMBER="${{ steps.issue.outputs.number }}"
          echo "Claiming issue #$ISSUE_NUMBER"

          # Save the full issue body (multi-line) as a step output for the prompt.
          gh issue view "$ISSUE_NUMBER" --json title,body \
            --jq '"### Ticket #'"$ISSUE_NUMBER"': \(.title)\n\n\(.body)"' \
            > /tmp/issue.md
          {
            echo "issue_details<<EOF"
            cat /tmp/issue.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          # Defensive: confirm the label is still on the issue
          HAS_LABEL=$(gh issue view "$ISSUE_NUMBER" --json labels \
            --jq '[.labels[].name] | any(. == "ai/ready-for-work")')
          if [ "$HAS_LABEL" != "true" ]; then
            echo "::error::Issue #$ISSUE_NUMBER does not carry the ai/ready-for-work label; refusing to run."
            exit 1
          fi

          # Transition: ai/ready-for-work -> ai/in-development
          gh issue edit "$ISSUE_NUMBER" \
            --remove-label "ai/ready-for-work" \
            --add-label "ai/in-development"

          gh issue comment "$ISSUE_NUMBER" --body "🤖 Claude Code cloud agent claimed this ticket. Working in branch \`claude/issue-$ISSUE_NUMBER\`."

      - name: Run Claude Code
        uses: anthropics/claude-code-action@aaa4b4c42c41206c0bff3334d5cdfb91267cb695 # v1.0.1
        with:
          # Prefer subscription OAuth ($0 marginal). Fall back to API key only
          # if OAuth is unset or empty.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN || '' }}
          anthropic_api_key: ${{ !secrets.CLAUDE_CODE_OAUTH_TOKEN && secrets.ANTHROPIC_API_KEY || '' }}
          github_token: ${{ secrets.PRS_PAT || secrets.GITHUB_TOKEN }}
          branch_prefix: 'claude/issue-'
          prompt: |
            You are the cloud implementation agent for this repository.

            ## Your role

            - You PLAN and IMPLEMENT. You do NOT review your own work.
            - Reviewers (separate from you): the repo's CI checks, CodeQL,
              `eas-risk-label`, Gemini Code Assist (the canonical AI reviewer
              per Enterprise AI Standards §B3), and a human merge approver.
            - You MUST follow `CLAUDE.md` and `AGENTS.md` at the repo root —
              and any directory-scoped CLAUDE.md inside `extension/`, `apps/`,
              `services/`, etc. Those files specify per-repo validation
              commands and hard rules.

            ## The ticket

            Read the ticket below carefully. The `scope` is what to do;
            `done-when` is the acceptance criteria. Implement exactly that —
            no scope creep.

            ${{ steps.ticket.outputs.issue_details }}

            ## Workflow you must follow

            1. The repo is already checked out at the default branch. Create
               a new branch named `claude/issue-<NUMBER>` (the action does
               this automatically via `branch_prefix`).
            2. Implement the scope. Use Read/Edit/Write/Bash as needed.
            3. Run the repo's local validation BEFORE committing. The repo's
               CLAUDE.md / AGENTS.md / .ai/config.json defines what these are.
               Common patterns:
                 - `npm run lint && npm run typecheck && npm test`
                 - `cargo test --workspace`
                 - `pytest`
                 - `make validate`
            4. Commit with a Conventional Commits style message — e.g.
               `docs(faq): add v1.1.0 FAQ`. Co-author Claude per the repo's
               existing commit message pattern.
            5. Push the branch.
            6. Open a PR against the default branch with:
               - Title: matches the commit message
               - Body: `Summary` + `Test plan` + `Closes #<NUMBER>`
               - Reference the EAS PR template (`.github/PULL_REQUEST_TEMPLATE.md`)
                 if present.
            7. Comment on the issue with the PR link.
            8. Stop. Do NOT enable auto-merge. Do NOT merge. The human
               reviewer decides.

            ## Hard rules (Enterprise AI Standards)

            - Do NOT use legacy local backlog/state files or markdown task
              lists as AI task state.
            - Do NOT commit anything under `.ai/`.
            - Do NOT skip pre-commit hooks (no `--no-verify`).
            - Do NOT push directly to the default branch.
            - Do NOT modify EAS-managed workflows (any file with the
              "Generated by ai-pipeline adopt" header).
            - Run validation locally; failures fix-forward, do not amend
              previous commits.
            - Keep the change tightly scoped to the `done-when` criteria.

            ## When you're done

            Comment on the issue with a one-line summary of what shipped
            and the PR URL. Then exit.

      - name: Transition on success
        if: success()
        env:
          GH_TOKEN: ${{ secrets.PRS_PAT || secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUMBER="${{ steps.issue.outputs.number }}"
          # If the action followed the prompt, the ticket is already on
          # ai/in-pr-review. If not, push it there so the board is accurate.
          HAS_PR_REVIEW=$(gh issue view "$ISSUE_NUMBER" --json labels \
            --jq '[.labels[].name] | any(. == "ai/in-pr-review")')
          if [ "$HAS_PR_REVIEW" != "true" ]; then
            gh issue edit "$ISSUE_NUMBER" \
              --remove-label "ai/in-development" \
              --add-label "ai/in-pr-review" || true
          fi

      - name: Transition on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.PRS_PAT || secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUMBER="${{ steps.issue.outputs.number }}"
          gh issue edit "$ISSUE_NUMBER" \
            --remove-label "ai/in-development" \
            --add-label "ai/blocked" || true
          gh issue comment "$ISSUE_NUMBER" \
            --body "🤖 Claude Code cloud agent failed — see [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}). Ticket moved to \`ai/blocked\`."
