name: Validate

on:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch base branch
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: git fetch origin "$BASE_REF" --depth=1

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Bootstrap repo
        run: npm run setup

      - name: Install Playwright browser
        run: node ./scripts/pnpmw.mjs exec playwright install --with-deps chromium

      - name: Run validate
        run: TERMSNIP_RUN_E2E=1 npm run validate

      - name: Upload browser artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: browser-artifacts
          if-no-files-found: ignore
          path: |
            artifacts/e2e
            playwright-report
            test-results
