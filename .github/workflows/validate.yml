name: Validate

on:
  pull_request:

concurrency:
  group: validate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Fetch base branch
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: git fetch origin "$BASE_REF" --depth=1

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: 22
          cache: pnpm

      - name: Cache Playwright browsers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Bootstrap repo
        run: npm run setup

      - name: Install Playwright browser
        run: node ./scripts/pnpmw.mjs exec playwright install --with-deps chromium

      - name: Run validate
        run: npm run validate:ci

      - name: Upload browser artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: browser-artifacts
          if-no-files-found: ignore
          path: |
            artifacts/e2e
            playwright-report
            test-results

  # #128: compile + test the Rust crate so a broken native build can no longer
  # ship "green". Runs on the same self-hosted macOS runner release-macos.yml
  # uses — the crate ships on macOS and the keychain-backed tests need a real
  # login keychain. If that runner is offline, change this single `runs-on`
  # line to `macos-latest` and re-run (no other step depends on the runner).
  rust-validate:
    runs-on: [self-hosted, macOS, ARM64]
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri

      - name: Bootstrap repo
        run: npm run setup

      # native:check generates icons + builds the frontend (tauri.conf's
      # frontendDist must exist for generate_context!) + runs cargo check;
      # validate:rust then adds cargo test. The localhost-sshd session fixture
      # stays #[ignore] (needs an unsandboxed sshd — tracked in #101).
      - name: Compile + test the Rust crate
        run: npm run validate:rust

      # #101: the localhost-sshd session fixture is #[ignore] by default (it
      # needs an unsandboxed sshd, which sandboxed local/dev envs lack). This
      # self-hosted macOS runner is a real machine, so run it explicitly to
      # exercise the SSH session lifecycle (create -> open stream -> I/O ->
      # close) end-to-end on every PR. A failure fails Validate. The
      # localShell / external-protocol session lifecycle already runs in the
      # validate:rust step above (those fixtures are not #[ignore]).
      - name: Native SSH session lifecycle (sshd fixture)
        run: cargo test --manifest-path src-tauri/Cargo.toml localhost_ssh_transport_fixture_flow -- --include-ignored
