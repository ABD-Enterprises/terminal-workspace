# Generated by ai-pipeline adopt --with-workflows from enterprise-ai-standards@v7.13.1 — overwrite via 'ai-pipeline adopt --force --with-workflows'.
# Do not hand-edit; tracked drift will be detected by 'ai-pipeline adopt' on the next run.
# Implements §C2 C20: closing a PR without merge requires a breadcrumb
# (`superseded-by: #N` or `abandoned: <reason>`) so the audit trail survives.
#
# Behavior:
#   - Triggers on pull_request.closed events ONLY when the PR was NOT merged.
#   - Waits 60 seconds for the closing actor to add the breadcrumb comment
#     (they often close-then-comment).
#   - Walks PR comments (newest first) looking for `superseded-by: #...` or
#     `abandoned: ...` in any comment posted within 24h of the close event.
#   - If neither is found, posts a polite reminder comment naming §A4 +
#     §C2 C20. The reminder is idempotent: if it already exists in the
#     thread, the workflow exits without duplicating.
#
# Read-only on labels and PR state; the workflow only POSTS comments and
# never closes/reopens/labels. Reviewer enforcement is tier-3 fallback per
# §C18; this workflow is the tier-2 reminder.
name: EAS superseded-by check
on:
  pull_request_target:
    types: [closed]

permissions:
  contents: read
  pull-requests: write
  issues: read

jobs:
  remind:
    runs-on: [self-hosted, macOS, local-build]
    if: github.event.pull_request != null && github.event.pull_request.merged == false
    env:
      BASH_ENV: ""
    defaults:
      run:
        shell: bash --noprofile --norc -eo pipefail {0}
    steps:
      - name: Wait for closing comment
        # Operators frequently close-then-comment within a few seconds. A short
        # sleep lets the breadcrumb land before we check for it.
        shell: bash
        run: sleep 60

      - name: Check for breadcrumb and remind if missing
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          CLOSED_AT: ${{ github.event.pull_request.closed_at }}
        shell: bash
        run: |
          set -euo pipefail

          # Walk comments. We accept the breadcrumb anywhere in any comment
          # body — at-the-bottom is the convention but mid-comment counts.
          comments_json=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json comments 2>/dev/null || echo '{"comments":[]}')

          # Idempotency: skip if our reminder is already in the thread.
          marker="<!-- eas-superseded-check:reminder -->"
          if jq -e --arg m "$marker" '.comments | map(.body) | any(contains($m))' >/dev/null <<<"$comments_json"; then
            echo "::notice::reminder already posted; skipping"
            exit 0
          fi

          # Look for the breadcrumb pattern in any comment OR the PR body.
          pr_body=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json body --jq .body 2>/dev/null || echo "")
          all_text=$(jq -r '.comments | map(.body) | join("\n---\n")' <<<"$comments_json")
          all_text="${all_text}"$'\n'"${pr_body}"

          # superseded-by: #123  OR  superseded-by: owner/repo#123
          # abandoned: <text>
          if echo "$all_text" | grep -qiE '^[[:space:]]*superseded-by:[[:space:]]+(([[:alnum:]._-]+/[[:alnum:]._-]+)?#[0-9]+)[[:space:]]*$'; then
            echo "::notice::breadcrumb found: superseded-by"
            exit 0
          fi
          if echo "$all_text" | grep -qiE '^[[:space:]]*abandoned:[[:space:]]+.+'; then
            echo "::notice::breadcrumb found: abandoned"
            exit 0
          fi

          # Missing — post the polite reminder.
          body=$(cat <<EOF
          $marker
          **Closed without a successor breadcrumb** — per EAS §A4 / §C2 C20, closing a PR without merging should name either a successor or a reason as the last paragraph of the closing comment:

          \`\`\`
          superseded-by: #N
          \`\`\`
          when the work continues in PR #N (use \`owner/repo#N\` for cross-repo), or:
          \`\`\`
          abandoned: <one-line-reason>
          \`\`\`
          when the work is dropped entirely.

          This preserves the audit trail so future agents and reviewers can reconstruct what happened to this PR. Add a comment with the breadcrumb when convenient; this reminder is advisory and posted once per PR.
          EOF
          )
          gh pr comment "$PR_NUMBER" --repo "$REPO" --body "$body"
          echo "::notice::breadcrumb missing; reminder posted"
