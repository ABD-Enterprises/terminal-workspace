# Do not hand-edit; tracked drift will be detected by 'ai-pipeline adopt' on the next run.
# Copy-in workflow — full logic inlined. See eas-auto-merge.yml header for rationale.
name: EAS Risk Label
on:
  pull_request:
    types: [opened, reopened, synchronize]

concurrency:
  group: eas-risk-label-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write

env:
  HEURISTICS_PATH: .github/eas-risk-heuristics.yml

jobs:
  label:
    runs-on: ubuntu-latest
    if: github.event.pull_request != null
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: pip install --quiet "PyYAML==6.*"

      - name: Apply risk heuristics
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        shell: python
        run: |
          import json, os, re, subprocess, sys, fnmatch
          import yaml

          repo = os.environ["GITHUB_REPOSITORY"]
          pr_number = os.environ["PR_NUMBER"]
          heuristics_path = os.environ["HEURISTICS_PATH"]
          base_sha = os.environ["BASE_SHA"]
          head_sha = os.environ["HEAD_SHA"]

          def sh(cmd, check=True):
              r = subprocess.run(cmd, capture_output=True, text=True)
              if check and r.returncode != 0:
                  print(f"::error::{' '.join(cmd)}: {r.stderr}", file=sys.stderr)
                  sys.exit(r.returncode)
              return r.stdout

          DEFAULTS = {
              "heuristics": [
                  {"pattern": "*.md", "label": "chore:trivial", "mode": "path", "root_only": True},
                  {"pattern": ".github/workflows/**", "label": "infra", "mode": "path"},
                  {"pattern": "Dockerfile*", "label": "infra", "mode": "path"},
                  {"pattern": "docs/**", "label": "chore:trivial", "mode": "path", "docs_only": True},
                  {"pattern": "pyproject.toml", "label": "dependency-change", "mode": "path",
                   "deps_section": True},
              ],
              "defaults": {"apply_if_no_config": True},
          }

          if os.path.exists(heuristics_path):
              with open(heuristics_path) as fh:
                  cfg = yaml.safe_load(fh) or {}
              cfg.setdefault("heuristics", DEFAULTS["heuristics"])
              cfg.setdefault("defaults", DEFAULTS["defaults"])
          else:
              print(f"::notice::No {heuristics_path}; using EAS defaults.")
              cfg = DEFAULTS

          # The PR Files API paginates cleanly for large PRs and avoids the
          # diff-size cap that can break name-only diff retrieval.
          changed_files_raw = sh(["gh", "api", f"repos/{repo}/pulls/{pr_number}/files",
                                  "--paginate", "--jq", ".[].filename"])
          changed_files = [p for p in changed_files_raw.splitlines() if p]
          print(f"changed files: {changed_files}")

          def match_path(pattern, path, root_only=False):
              if root_only and "/" in path:
                  return False
              return fnmatch.fnmatch(path, pattern) or fnmatch.fnmatch(os.path.basename(path), pattern)

          def file_matches_content_regex(path, regex):
              diff = sh(["git", "diff", f"{base_sha}..{head_sha}", "--", path], check=False)
              for line in diff.splitlines():
                  if line.startswith("+") and not line.startswith("+++"):
                      if re.search(regex, line[1:]):
                          return True
              return False

          def deps_section_changed(path):
              if not path.endswith("pyproject.toml"):
                  return False
              diff = sh(["git", "diff", f"{base_sha}..{head_sha}", "--", path], check=False)
              in_section = False
              for line in diff.splitlines():
                  if line.startswith("@@"):
                      continue
                  stripped = line.lstrip("+-").lstrip()
                  if stripped.startswith("["):
                      in_section = "dependencies" in stripped
                      continue
                  if in_section and (line.startswith("+") or line.startswith("-")) and not line.startswith(("+++", "---")):
                      return True
              return False

          desired = set()
          docs_only = bool(changed_files) and all(p.startswith("docs/") or p.endswith(".md") for p in changed_files)

          for h in cfg.get("heuristics", []):
              pattern = h["pattern"]
              label = h["label"]
              mode = h.get("mode", "path")
              if mode == "path":
                  if h.get("docs_only") and not docs_only:
                      continue
                  for path in changed_files:
                      if h.get("deps_section") and not deps_section_changed(path):
                          continue
                      if match_path(pattern, path, root_only=h.get("root_only", False)):
                          desired.add(label)
                          break
              elif mode == "content":
                  for path in changed_files:
                      if file_matches_content_regex(path, pattern):
                          desired.add(label)
                          break
              else:
                  print(f"::warning::Unknown heuristic mode '{mode}' for label {label}; skipping.")

          pr_data = json.loads(sh(["gh", "pr", "view", pr_number, "--repo", repo,
                                    "--json", "labels"]))
          existing = {lbl["name"] for lbl in pr_data.get("labels", [])}

          import datetime as dt
          now = dt.datetime.now(dt.timezone.utc)
          cutoff = now - dt.timedelta(hours=24)
          protected = set()
          events = json.loads(sh(["gh", "api",
                                   f"repos/{repo}/issues/{pr_number}/events",
                                   "--paginate"]))
          for ev in events:
              if ev.get("event") != "unlabeled":
                  continue
              actor = (ev.get("actor") or {}) or {}
              login = actor.get("login", "")
              actor_type = actor.get("type", "")
              if actor_type == "Bot" or login.endswith("[bot]"):
                  continue
              created = dt.datetime.fromisoformat(ev["created_at"].replace("Z", "+00:00"))
              if created >= cutoff:
                  protected.add(ev["label"]["name"])

          to_add = (desired - existing) - protected
          if to_add:
              for label in sorted(to_add):
                  print(f"adding label: {label}")
                  sh(["gh", "pr", "edit", pr_number, "--repo", repo, "--add-label", label], check=False)
          else:
              print("no labels to add")

          if protected:
              print(f"protected (human-removed within 24h, not re-adding): {sorted(protected)}")
