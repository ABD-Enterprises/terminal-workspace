# Keep GitHub Actions pinned/updated via auto-PRs (free; flow through the
# existing auto-merge path). npm + Cargo ecosystems are added since this repo
# ships a pnpm workspace and a Rust crate.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
  - package-ecosystem: "cargo"
    directory: "/src-tauri"
    schedule:
      interval: "weekly"
